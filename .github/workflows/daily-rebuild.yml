name: Daily Site Rebuild

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Last.fm API key to Cloudflare Pages
        run: echo "$LASTFM_API_KEY" | npx wrangler pages secret put LASTFM_API_KEY --project-name matthewmincherdev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}

  trigger-rebuild:
    runs-on: ubuntu-latest
    needs: sync-secrets
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger Cloudflare deploy hook
        run: curl -s -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}"
