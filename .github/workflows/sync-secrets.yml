name: Sync Secrets to Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Propagate Last.fm API key to Cloudflare Worker
        run: echo "$LASTFM_API_KEY" | wrangler secret put LASTFM_API_KEY --name matthewmincherdev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}

      - name: Propagate InfluxDB token to Cloudflare Worker
        run: echo "$INFLUXDB_TOKEN" | wrangler secret put INFLUXDB_TOKEN --name matthewmincherdev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          INFLUXDB_TOKEN: ${{ secrets.INFLUXDB_TOKEN }}

      - name: Propagate InfluxDB org to Cloudflare Worker
        run: echo "$INFLUXDB_ORG" | wrangler secret put INFLUXDB_ORG --name matthewmincherdev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          INFLUXDB_ORG: ${{ secrets.INFLUXDB_ORG }}
